[env:ATmega2560]
platform = atmelavr
board = megaatmega2560
framework = arduino
lib_deps = 
	adafruit/Adafruit Unified Sensor@^1.1.15
	adafruit/Adafruit BNO08x@^1.2.5
	arduino-libraries/Servo@^1.2.2
	nicohood/PinChangeInterrupt@^1.2.9
	robtillaart/I2C_EEPROM@^1.9.4
	lordmax2/klevebrand-drone-gyro-bno085@^1.0.4
	lordmax2/klevebrand-all-drone-controller-core@^2.4.0
upload_speed = 115200
monitor_speed = 115200
monitor_filters = default, log2file
